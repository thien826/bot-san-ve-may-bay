<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Hunter Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .log-container { background: #1e1e1e; color: #39ff14; font-family: monospace; padding: 15px; height: 300px; overflow-y: auto; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="text-center mb-4 text-primary font-weight-bold">✈️ FLIGHT HUNTER CONTROL PANEL ✈️</h2>
    
    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card p-4">
                <h4 class="mb-3 text-secondary">⚙️ Cấu hình Săn vé</h4>
                
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>📍 Sân bay đi</label>
                        <input type="text" id="origin" class="form-control text-center font-weight-bold" value="SGN">
                    </div>
                    <div class="form-group col-md-6">
                        <label>🏁 Sân bay đến</label>
                        <input type="text" id="destination" class="form-control text-center font-weight-bold" value="HAN">
                    </div>
                </div>

                <div class="form-group">
                    <label>📅 Ngày bay (YYYY-MM-DD)</label>
                    <input type="date" id="fly_date" class="form-control">
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">👑 Chọn Hãng Hàng Không</label>
                    <select id="airline" class="form-control">
                        <option value="ALL">-- Tất cả các hãng --</option>
                        <option value="VJ">VietJet Air (Giá rẻ)</option>
                        <option value="VN">Vietnam Airlines (Premium)</option>
                        <option value="QH">Bamboo Airways</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>💵 Giá vé tối đa kỳ vọng (VND)</label>
                    <input type="number" id="threshold" class="form-control" value="1200000">
                </div>

                <div class="form-group">
                    <label>⏱️ Tần suất quét (Phút/Lần)</label>
                    <input type="number" id="interval" class="form-control" value="15">
                </div>

                <div class="custom-control custom-switch mb-4">
                    <input type="checkbox" class="custom-control-input" id="is_active">
                    <label class="custom-control-label font-weight-bold" for="is_active">Kích hoạt Bot chạy tự động</label>
                </div>

                <button class="btn btn-primary btn-block font-weight-bold" onclick="saveConfig()">💾 LƯU CẤU HÌNH</button>
                <button class="btn btn-success btn-block font-weight-bold mt-2" onclick="scanNow()">🔍 QUÉT VÀ BÁO CÁO NGAY</button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 mb-4">
                <h4 class="text-secondary">📋 Kết quả quét mới nhất</h4>
                <div id="results-box" class="py-2">Chưa có dữ liệu...</div>
            </div>
            
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h4 class="text-secondary mb-0">📟 Nhật ký hoạt động</h4>
                    <button class="btn btn-sm btn-outline-danger" onclick="clearLogs()">Xóa log</button>
                </div>
                <div id="logs-box" class="log-container">Chưa có hoạt động nào...</div>
            </div>
        </div>
    </div>
</div>

<script>
    function loadState() {
        fetch('/api/state').then(res => res.json()).then(data => {
            document.getElementById('origin').value = data.config.origin;
            document.getElementById('destination').value = data.config.destination;
            document.getElementById('fly_date').value = data.config.fly_date;
            document.getElementById('threshold').value = data.config.threshold;
            document.getElementById('interval').value = data.config.interval;
            document.getElementById('is_active').checked = data.config.is_active;
            if(data.config.airline) {
                document.getElementById('airline').value = data.config.airline;
            }
            
            // Hiển thị logs
            let logBox = document.getElementById('logs-box');
            if(data.logs.length > 0) {
                logBox.innerHTML = data.logs.map(l => `[${l.time}] ${l.text}`).join('<br>');
            }
            
            // Hiển thị kết quả vé
            let resBox = document.getElementById('results-box');
            if(data.results.length > 0) {
                resBox.innerHTML = data.results.map(f => `
                    <div class="p-2 border-bottom d-flex justify-content-between align-items-center">
                        <div><b>${f.airline}</b> (${f.id}) - ⏰ ${f.departure}</div>
                        <div><span class="badge badge-success" style="font-size:14px">${f.price.toLocaleString()} ₫</span></div>
                    </div>
                `).join('');
            }
        });
    }

    function saveConfig() {
        let payload = {
            origin: document.getElementById('origin').value,
            destination: document.getElementById('destination').value,
            fly_date: document.getElementById('fly_date').value,
            threshold: document.getElementById('threshold').value,
            interval: document.getElementById('interval').value,
            is_active: document.getElementById('is_active').checked,
            airline: document.getElementById('airline').value // Gửi hãng lên server
        };
        fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(() => { alert("Đã lưu cấu hình!"); loadState(); });
    }

    function scanNow() {
        fetch('/api/scan-now', { method: 'POST' }).then(() => alert("Hệ thống đang quét, kiểm tra Telegram sau vài giây nhé!"));
    }

    function clearLogs() {
        fetch('/api/clear-logs', { method: 'POST' }).then(() => loadState());
    }

    setInterval(loadState, 4000);
    window.onload = loadState;
</script>
</body>
</html>
