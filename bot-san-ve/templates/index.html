<!DOCTYPE html>
<html lang="vi" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flight Hunter Pro — Săn Vé Thông Minh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --emerald:#10b981; --emerald-light:#34d399; --emerald-dark:#059669; --navy:#0a1628; --text:#1e293b; --muted:#64748b;}
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif; color:var(--text); overflow-x:hidden}
  nav{position:fixed; top:0; left:0; right:0; z-index:100; padding:16px 40px; display:flex; justify-content:space-between; background:rgba(10,22,40,0.95); color:white;}
  .hero{height:100vh; position:relative; overflow:hidden; display:flex; align-items:center; background:#0a1628; color:white; justify-content:center; text-align:center;}
  .container{max-width:1200px; margin:0 auto; padding:80px 40px;}
  .modal-overlay{position:fixed; inset:0; background:rgba(10,22,40,0.85); z-index:1000; display:none; align-items:center; justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:white; border-radius:24px; width:100%; max-width:420px; padding:28px;}
  .btn{background:var(--emerald); color:white; padding:12px 24px; border:none; border-radius:8px; cursor:pointer;}
</style>
</head>
<body>
<nav>
  <h2>FlightHunter</h2>
  <div>
    <button class="btn" onclick="openModal('login')">Đăng nhập</button>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>Săn vé máy bay Rẻ & Nhanh Nhất</h1>
    <p>Hệ thống tự động theo dõi và cảnh báo giá vé qua Telegram 24/7.</p>
    <br>
    
    <!-- Đoạn SVG đã được sửa lỗi cắt ngang -->
    <svg width="400" height="200" viewBox="0 0 1400 700">
      <rect width="1400" height="700" fill="#0a3d62"/>
      <ellipse cx="700" cy="680" rx="900" ry="120" fill="#1bb38a" opacity="0.8"/>
      <!-- Boat silhouette Fixed -->
      <polygon points="650,580 750,580 720,600 680,600" fill="#022c22" opacity="0.9"/>
      <polygon points="700,520 700,580 740,570" fill="#065f46" opacity="0.8"/>
    </svg>

  </div>
</section>

<!-- Modal Auth -->
<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <h2 style="color:var(--navy); margin-bottom: 20px;">Đăng nhập / Đăng ký</h2>
    <div id="alert-box" style="color: red; margin-bottom: 10px;"></div>
    <form id="authForm" onsubmit="handleAuth(event)">
      <input type="text" id="username" placeholder="Tên đăng nhập" required style="width:100%; padding:10px; margin-bottom:10px;">
      <input type="password" id="password" placeholder="Mật khẩu" required style="width:100%; padding:10px; margin-bottom:10px;">
      <button type="button" class="btn" onclick="setMode('login')" style="width:48%">Đăng nhập</button>
      <button type="button" class="btn" onclick="setMode('register')" style="width:48%; background:#64748b;">Đăng ký</button>
      <button type="submit" id="submitBtn" style="display:none;"></button>
    </form>
    <button onclick="closeModal()" style="margin-top:15px; border:none; background:none; cursor:pointer;">Đóng</button>
  </div>
</div>

<script>
  let currentMode = 'login';
  function openModal(mode) { 
    document.getElementById('authModal').classList.add('open'); 
    setMode(mode);
  }
  function closeModal() { document.getElementById('authModal').classList.remove('open'); }
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('submitBtn').click();
  }
  
  async function handleAuth(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    
    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ action: currentMode, username: u, password: p })
      });
      const data = await res.json();
      if (data.status === 'ok') {
        window.location.href = '/dashboard';
      } else {
        document.getElementById('alert-box').innerText = data.msg;
      }
    } catch (err) {
      alert("Lỗi kết nối!");
    }
  }
</script>
</body>
</html>
